<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5f7"/>
      <stop offset="50%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fce4ec"/>
    </linearGradient>
    <g id="sakura">
      <!-- Five petals -->
      <path d="M12,0 L14,8 L22,10 L14,12 L12,20 L10,12 L2,10 L10,8 Z" fill="#f9a8d4" opacity="0.35"/>
      <circle cx="12" cy="10" r="2" fill="#f472b6" opacity="0.2"/>
    </g>
    <g id="sakura-small">
      <path d="M8,0 L9,5 L14,7 L9,8 L8,13 L7,8 L2,7 L7,5 Z" fill="#f9a8d4" opacity="0.25"/>
    </g>
    <g id="petal">
      <path d="M0,0 C3,-7 9,-7 12,0 C9,7 3,7 0,0Z" fill="#fbcfe8" opacity="0.3"/>
    </g>
  </defs>
  <rect width="300" height="300" fill="url(#bg)"/>

  <!-- Edge-crossing elements for seamless tiling -->
  <!-- Full flowers -->
  <use href="#sakura" x="30" y="45" transform="rotate(15 42 55)"/>
  <use href="#sakura" x="180" y="20" transform="rotate(-20 192 30)"/>
  <use href="#sakura" x="220" y="140" transform="rotate(45 232 150)"/>
  <use href="#sakura" x="50" y="190" transform="rotate(-35 62 200)"/>
  <use href="#sakura" x="140" y="250" transform="rotate(60 152 260)"/>

  <use href="#sakura-small" x="120" y="90" transform="rotate(25 128 95)"/>
  <use href="#sakura-small" x="80" y="280" transform="rotate(-40 84 284)"/>
  <use href="#sakura-small" x="260" y="250" transform="rotate(70 264 254)"/>
  <use href="#sakura-small" x="10" y="120" transform="rotate(-15 14 124)"/>
  <use href="#sakura-small" x="170" y="190" transform="rotate(50 174 194)"/>

  <!-- Scattered single petals -->
  <use href="#petal" x="90" y="20" transform="rotate(10 96 20)"/>
  <use href="#petal" x="200" y="80" transform="rotate(-30 206 80)"/>
  <use href="#petal" x="150" y="140" transform="rotate(80 156 140)"/>
  <use href="#petal" x="60" y="100" transform="rotate(-60 66 100)"/>
  <use href="#petal" x="280" y="190" transform="rotate(20 286 190)"/>
  <use href="#petal" x="30" y="260" transform="rotate(-45 36 260)"/>
  <use href="#petal" x="250" y="40" transform="rotate(35 256 40)"/>
  <use href="#petal" x="120" y="220" transform="rotate(-10 126 220)"/>

  <!-- Tile-boundary crossing elements (appear on both sides for seamless repeat) -->
  <!-- Left edge → also on right edge at x-300 -->
  <use href="#sakura-small" x="0" y="160" transform="rotate(10 4 164)"/>
  <use href="#petal" x="0" y="60" transform="rotate(40 3 60)"/>
  <!-- Top edge → also on bottom edge at y-300 -->
  <use href="#petal" x="130" y="0" transform="rotate(25 133 0)"/>
  <use href="#sakura-small" x="280" y="0" transform="rotate(-15 284 0)"/>
</svg>
